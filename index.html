<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1021" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flood Finder" />
    <link rel="manifest" href="/manifest.json" />
    <title>Flood Finder</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Pre-React error catcher — shows errors before any JS framework loads
      window.__earlyErrors = [];
      window.onerror = function(m,s,l,c,e) {
        window.__earlyErrors.push(m + ' at ' + s + ':' + l);
        var d = document.getElementById('__early_err');
        if (!d) {
          d = document.createElement('div');
          d.id = '__early_err';
          d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#300;border-bottom:2px solid red;padding:8px;font:11px monospace;color:#fbbf24;max-height:30vh;overflow:auto;white-space:pre-wrap;';
          document.body.prepend(d);
        }
        d.textContent = window.__earlyErrors.join('\n');
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
